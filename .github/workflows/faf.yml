name: faf

on:
  schedule:
    - cron: '12 * * * *'

  workflow_dispatch:
    inputs:
      run_mode:
        description: "Type RUN to start faf bot"
        required: true
        default: "RUN"

permissions:
  contents: read

concurrency:
  group: faf-task-unit
  cancel-in-progress: false

jobs:
  run-faf:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate trigger source
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Mode: ${{ github.event.inputs.run_mode }}"
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ github.event.inputs.run_mode }}" != "RUN" ]; then
            echo "Not authorized run. Exiting."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Project
        run: mvn -B clean compile

      - name: Run Bot (5-thread Java execution)
        env:
          GAME_ID_1: ${{ secrets.GAME_ID_1 }}
          GAME_PASSWORD_1: ${{ secrets.GAME_PASSWORD_1 }}
          GAME_ID_2: ${{ secrets.GAME_ID_2 }}
          GAME_PASSWORD_2: ${{ secrets.GAME_PASSWORD_2 }}
          GAME_ID_3: ${{ secrets.GAME_ID_3 }}
          GAME_PASSWORD_3: ${{ secrets.GAME_PASSWORD_3 }}
          GAME_ID_4: ${{ secrets.GAME_ID_4 }}
          GAME_PASSWORD_4: ${{ secrets.GAME_PASSWORD_4 }}
          GAME_ID_5: ${{ secrets.GAME_ID_5 }}
          GAME_PASSWORD_5: ${{ secrets.GAME_PASSWORD_5 }}
          GAME_ID_6: ${{ secrets.GAME_ID_6 }}
          GAME_PASSWORD_6: ${{ secrets.GAME_PASSWORD_6 }}
          GAME_ID_7: ${{ secrets.GAME_ID_7 }}
          GAME_PASSWORD_7: ${{ secrets.GAME_PASSWORD_7 }}
          GAME_ID_8: ${{ secrets.GAME_ID_8 }}
          GAME_PASSWORD_8: ${{ secrets.GAME_PASSWORD_8 }}
          GAME_ID_9: ${{ secrets.GAME_ID_9 }}
          GAME_PASSWORD_9: ${{ secrets.GAME_PASSWORD_9 }}
          GAME_ID_10: ${{ secrets.GAME_ID_10 }}
          GAME_PASSWORD_10: ${{ secrets.GAME_PASSWORD_10 }}
          GAME_ID_11: ${{ secrets.GAME_ID_11 }}
          GAME_PASSWORD_11: ${{ secrets.GAME_PASSWORD_11 }}
          GAME_ID_12: ${{ secrets.GAME_ID_12 }}
          GAME_PASSWORD_12: ${{ secrets.GAME_PASSWORD_12 }}
          GAME_ID_13: ${{ secrets.GAME_ID_13 }}
          GAME_PASSWORD_13: ${{ secrets.GAME_PASSWORD_13 }}
          GAME_ID_14: ${{ secrets.GAME_ID_14 }}
          GAME_PASSWORD_14: ${{ secrets.GAME_PASSWORD_14 }}
          GAME_ID_15: ${{ secrets.GAME_ID_15 }}
          GAME_PASSWORD_15: ${{ secrets.GAME_PASSWORD_15 }}
          GAME_ID_16: ${{ secrets.GAME_ID_16 }}
          GAME_PASSWORD_16: ${{ secrets.GAME_PASSWORD_16 }}
          GAME_ID_17: ${{ secrets.GAME_ID_17 }}
          GAME_PASSWORD_17: ${{ secrets.GAME_PASSWORD_17 }}
          GAME_ID_18: ${{ secrets.GAME_ID_18 }}
          GAME_PASSWORD_18: ${{ secrets.GAME_PASSWORD_18 }}
          GAME_ID_19: ${{ secrets.GAME_ID_19 }}
          GAME_PASSWORD_19: ${{ secrets.GAME_PASSWORD_19 }}
          GAME_ID_20: ${{ secrets.GAME_ID_20 }}
          GAME_PASSWORD_20: ${{ secrets.GAME_PASSWORD_20 }}

        run: mvn -B -q exec:java -Dexec.mainClass="faf"
