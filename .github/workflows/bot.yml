name: Game Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      matrix:
        include:
          - id: GAME_ID_1
            pass: GAME_PASSWORD_1
          - id: GAME_ID_2
            pass: GAME_PASSWORD_2
          - id: GAME_ID_3
            pass: GAME_PASSWORD_3
          - id: GAME_ID_4
            pass: GAME_PASSWORD_4
          - id: GAME_ID_5
            pass: GAME_PASSWORD_5
          - id: GAME_ID_6
            pass: GAME_PASSWORD_6
          - id: GAME_ID_7
            pass: GAME_PASSWORD_7
          - id: GAME_ID_8
            pass: GAME_PASSWORD_8
          - id: GAME_ID_9
            pass: GAME_PASSWORD_9
          - id: GAME_ID_10
            pass: GAME_PASSWORD_10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build
        run: mvn clean package -DskipTests

      - name: Run Bot
        run: java -jar target/game-bot-1.0-jar-with-dependencies.jar
        env:
          GAME_ID: ${{ secrets[matrix.id] }}
          GAME_PASSWORD: ${{ secrets[matrix.pass] }}
