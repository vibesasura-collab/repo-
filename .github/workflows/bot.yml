name: Game Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      matrix:
        include:
          - id: 1
            game_id_secret: GAME_ID_1
            game_password_secret: GAME_PASSWORD_1

          - id: 2
            game_id_secret: GAME_ID_2
            game_password_secret: GAME_PASSWORD_2

          - id: 3
            game_id_secret: GAME_ID_3
            game_password_secret: GAME_PASSWORD_3

          - id: 4
            game_id_secret: GAME_ID_4
            game_password_secret: GAME_PASSWORD_4

          - id: 5
            game_id_secret: GAME_ID_5
            game_password_secret: GAME_PASSWORD_5

          - id: 6
            game_id_secret: GAME_ID_6
            game_password_secret: GAME_PASSWORD_6

          - id: 7
            game_id_secret: GAME_ID_7
            game_password_secret: GAME_PASSWORD_7

          - id: 8
            game_id_secret: GAME_ID_8
            game_password_secret: GAME_PASSWORD_8

          - id: 9
            game_id_secret: GAME_ID_9
            game_password_secret: GAME_PASSWORD_9

          - id: 10
            game_id_secret: GAME_ID_10
            game_password_secret: GAME_PASSWORD_10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run Bot
        run: java -jar target/game-bot-1.0-jar-with-dependencies.jar
        env:
          GAME_ID: ${{ secrets[ matrix.game_id_secret ] }}
          GAME_PASSWORD: ${{ secrets[ matrix.game_password_secret ] }}
