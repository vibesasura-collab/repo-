name: Raid Bot (Manual Mode)

on:
  workflow_dispatch:

jobs:
  run-raid:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - id: 1
          - id: 2
          - id: 3
          - id: 4
          - id: 5
          - id: 6
          - id: 7
          - id: 8
          - id: 9
          - id: 10
          - id: 11
          - id: 12
          - id: 13
          - id: 14
          - id: 15
          - id: 16
          - id: 17
          - id: 18
          - id: 19
          - id: 20
          - id: 21
          - id: 22
          - id: 23
          - id: 24
          - id: 25
          - id: 26
          - id: 27
          - id: 28
          - id: 29
          - id: 30
          - id: 31
          - id: 32
          - id: 33
          - id: 34
          - id: 35
          - id: 36
          - id: 37
          - id: 38
          - id: 39

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Raid Bot
        env:
          GAME_ID: ${{ secrets[format('GAME_ID_{0}', matrix.id)] }}
          GAME_PASSWORD: ${{ secrets[format('GAME_PASSWORD_{0}', matrix.id)] }}
        run: mvn -B clean compile exec:java -Dexec.mainClass=RaidBot
